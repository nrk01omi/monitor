services:
  ollama-proxy:
    build: .
    container_name: ollama-proxy
    restart: unless-stopped
    ports:
      # Host:Container. Change the host side if 11435/3005 are taken on the host.
      - "11435:11435"
      - "3005:3005"
    volumes:
      # Named volume avoids host UID/GID mismatch on Linux. Use
      #   docker compose down  (data persists)
      #   docker compose down -v  (data wiped)
      - ollama-proxy-data:/app/data
    environment:
      # OLLAMA_HOST is consumed only on first boot to seed the upstreams table.
      # After that, manage upstreams from the dashboard. host.docker.internal
      # works on Docker Desktop (Win/Mac) out of the box.
      OLLAMA_HOST: ${OLLAMA_HOST:-host.docker.internal:11434}
      # whisper-server (faster-whisper) のエンドポイント。POST /api/transcribe を
      # ここに stream pass-through する。同じ network なのでサービス名で解決。
      WHISPER_URL: ${WHISPER_URL:-http://whisper-server:11436}
      # Monitor poll cadence + retention. Override per environment if needed.
      MONITOR_POLL_SECONDS: ${MONITOR_POLL_SECONDS:-10}
      MONITOR_RETENTION_DAYS: ${MONITOR_RETENTION_DAYS:-7}
      # Portainer API — used by the docker checker instead of /var/run/docker.sock.
      # Create an access token in Portainer (My account → Access tokens) and put it in .env.
      PORTAINER_URL: ${PORTAINER_URL:-http://portainer:9000}
      PORTAINER_ENDPOINT_ID: ${PORTAINER_ENDPOINT_ID:-3}
      PORTAINER_API_KEY: ${PORTAINER_API_KEY:-}
    extra_hosts:
      # Linux hosts need this to make host.docker.internal resolve.
      - "host.docker.internal:host-gateway"
    networks:
      # Join the same external network as the monitored containers (n8n, scan-worker, etc.)
      # so HTTP probes can resolve service names. Comment out if not on n8n stack.
      - default
      - n8n_default

  whisper-server:
    build: ../whisper-server
    container_name: whisper-server
    restart: unless-stopped
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-large-v3-turbo}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-auto}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-auto}
    volumes:
      # モデル本体は数GBあるので named volume にキャッシュ。再起動時の再DLを避ける。
      - whisper-cache:/cache/huggingface
    # GPU 利用前提。CPU で動かす場合はこの deploy ブロックごと削除し、
    # whisper-server/Dockerfile の base を python:3.12-slim に変更する。
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - default

volumes:
  ollama-proxy-data:
  whisper-cache:

networks:
  n8n_default:
    external: true
