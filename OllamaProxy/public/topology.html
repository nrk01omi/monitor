<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infrastructure Topology — Ollama Proxy Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --surface2:  #21262d;
    --border:    #30363d;
    --text:      #e6edf3;
    --text2:     #8b949e;
    --accent:    #58a6ff;
    --green:     #3fb950;
    --red:       #f85149;
    --orange:    #d29922;
    --gray:      #6e7681;
    --radius:    6px;
    --font:      'Segoe UI', system-ui, -apple-system, sans-serif;
    --mono:      'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
  }

  html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; }

  #app { display: flex; flex-direction: column; height: 100vh; }

  header.page-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex; align-items: center; gap: 16px; flex-shrink: 0;
  }
  header.page-header h1 { font-size: 16px; font-weight: 600; }
  .stat-bar { display: flex; gap: 16px; margin-left: auto; }
  .pill { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.up        { background: var(--green); }
  .dot.degraded  { background: var(--orange); }
  .dot.down      { background: var(--red); }
  .dot.unknown   { background: var(--gray); }

  .main { display: grid; grid-template-columns: 1fr 380px; flex: 1; overflow: hidden; }
  #cy   { width: 100%; height: 100%; background: var(--bg); }

  aside.detail {
    background: var(--surface);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
  }
  aside.detail h2 {
    font-size: 12px; color: var(--text2);
    text-transform: uppercase; letter-spacing: .05em;
    margin: 0 0 12px; font-weight: 600;
  }
  .empty { color: var(--text2); font-size: 13px; padding: 30px 0; text-align: center; }
  .selected-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .selected-meta { font-size: 12px; color: var(--text2); margin-bottom: 16px; }
  .field {
    display: flex; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .field-key { color: var(--text2); }
  .field-val { color: var(--text); font-family: var(--mono); }
  .err {
    background: rgba(248, 81, 73, 0.08);
    border: 1px solid rgba(248, 81, 73, 0.3);
    color: var(--red);
    padding: 8px 10px;
    border-radius: var(--radius);
    font-size: 12px;
    margin-top: 12px;
    word-break: break-all;
  }
  .chart-wrap { margin-top: 16px; height: 180px; position: relative; }

  /* edit form */
  #edit-form h2 { margin-top: 24px; }
  .form-row { display: flex; flex-direction: column; gap: 4px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .form-row > label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; }
  .form-row input[type="text"],
  .form-row input[type="number"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 6px 8px;
    font-family: var(--mono);
    font-size: 13px;
    width: 100%;
  }
  .form-row input[type="text"]:focus,
  .form-row input[type="number"]:focus { outline: none; border-color: var(--accent); }
  .form-row-checkbox { flex-direction: row; align-items: center; gap: 8px; }
  .form-row-checkbox > label {
    display: flex; align-items: center; gap: 6px;
    text-transform: none; letter-spacing: 0;
    font-size: 13px; color: var(--text); cursor: pointer;
  }
  .form-actions { display: flex; align-items: center; gap: 12px; margin-top: 14px; }
  .form-actions button {
    background: var(--accent);
    color: #0d1117;
    border: 0;
    border-radius: var(--radius);
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .form-actions button:hover { filter: brightness(1.08); }
  .form-actions button:disabled { opacity: 0.5; cursor: not-allowed; }
  .msg-ok  { color: var(--green); font-size: 12px; }
  .msg-err { color: var(--red);   font-size: 12px; word-break: break-all; }
  .models-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .model-tag {
    background: rgba(88, 166, 255, 0.1);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-family: var(--mono);
  }
  footer.page-footer {
    grid-column: 1 / -1;
    padding: 6px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text2);
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>
<div id="app">

  <div id="top-nav"></div>

  <header class="page-header">
    <h1>Infrastructure Topology</h1>
    <div class="stat-bar" id="stats"></div>
  </header>

  <div class="main">
    <div id="cy"></div>
    <aside class="detail" id="side">
      <div class="empty">ノードをクリックすると詳細が表示されます</div>
    </aside>
    <footer class="page-footer">
      <span id="last-update">—</span>
      <span>10秒ごとに自動更新</span>
    </footer>
  </div>

</div>

<script src="/nav.js"></script>
<script src="/topology.js"></script>
</body>
</html>
