<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archives — Ollama Proxy Monitor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --surface2:  #21262d;
    --border:    #30363d;
    --text:      #e6edf3;
    --text2:     #8b949e;
    --accent:    #58a6ff;
    --green:     #3fb950;
    --red:       #f85149;
    --orange:    #d29922;
    --radius:    6px;
    --font:      'Segoe UI', system-ui, -apple-system, sans-serif;
    --mono:      'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
  }
  html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; }
  #app { display: flex; flex-direction: column; min-height: 100vh; }

  header.page-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex; align-items: center; gap: 16px; flex-shrink: 0;
  }
  header.page-header h1 { font-size: 16px; font-weight: 600; }
  .actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .btn {
    padding: 6px 14px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--surface2); color: var(--text);
    cursor: pointer; font-size: 13px;
  }
  .btn:hover { background: var(--border); }
  .btn.primary { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .body { padding: 20px; flex: 1; }
  .table-section { margin-bottom: 28px; }
  .table-section h2 {
    font-size: 13px; color: var(--text2);
    text-transform: uppercase; letter-spacing: .05em;
    margin-bottom: 8px; font-weight: 600;
  }
  table {
    width: 100%; border-collapse: collapse;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden;
  }
  th, td { padding: 8px 12px; text-align: left; font-size: 13px; border-bottom: 1px solid var(--border); }
  th { background: var(--surface2); font-weight: 600; color: var(--text2); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
  tr:last-child td { border-bottom: none; }
  td.size, td.mtime { color: var(--text2); font-family: var(--mono); }
  td.date  { font-family: var(--mono); }
  td a { color: var(--accent); text-decoration: none; }
  td a:hover { text-decoration: underline; }
  .empty { color: var(--text2); padding: 12px; font-size: 13px; }
  .toast {
    position: fixed; bottom: 16px; right: 16px;
    background: var(--surface); border: 1px solid var(--border);
    padding: 10px 14px; border-radius: var(--radius); font-size: 13px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    max-width: 480px;
  }
  .toast.error { border-color: var(--red); color: var(--red); }
  .toast.ok    { border-color: var(--green); }
</style>
</head>
<body>
<div id="app">

  <div id="top-nav"></div>

  <header class="page-header">
    <h1>Archives</h1>
    <div class="actions">
      <button class="btn" id="btnRefresh">Refresh</button>
      <button class="btn primary" id="btnRun">Archive now</button>
    </div>
  </header>

  <div class="body" id="body">
    <div class="empty">読み込み中…</div>
  </div>

</div>

<script src="/nav.js"></script>
<script src="/archives.js"></script>
</body>
</html>
