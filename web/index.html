<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Infrastructure Monitor</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --border: #2a313c;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --green: #3fb950;
    --amber: #d29922;
    --red: #f85149;
    --gray: #6e7681;
    --accent: #58a6ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Meiryo", sans-serif;
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100vh;
  }
  header {
    padding: 12px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 500; }
  .stats { display: flex; gap: 16px; font-size: 13px; color: var(--text-muted); margin-left: auto; }
  .stat-pill { display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.up { background: var(--green); }
  .dot.degraded { background: var(--amber); }
  .dot.down { background: var(--red); }
  .dot.unknown { background: var(--gray); }

  main {
    display: grid;
    grid-template-columns: 1fr 360px;
    overflow: hidden;
  }
  #cy {
    width: 100%;
    height: 100%;
    background: var(--bg);
  }
  #side {
    background: var(--panel);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
  }
  #side h2 {
    font-size: 13px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 0 0 12px;
    font-weight: 500;
  }
  .empty {
    color: var(--text-muted);
    font-size: 13px;
    padding: 20px 0;
  }
  .selected-name {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .selected-meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }
  .field {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .field-key { color: var(--text-muted); }
  .field-val { color: var(--text); font-family: ui-monospace, "SF Mono", Consolas, monospace; }
  .err {
    background: rgba(248, 81, 73, 0.1);
    border: 1px solid rgba(248, 81, 73, 0.3);
    color: var(--red);
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 12px;
    margin-top: 12px;
    word-break: break-all;
  }
  .chart-wrap {
    margin-top: 20px;
    height: 200px;
    position: relative;
  }
  .models-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .model-tag {
    background: rgba(88, 166, 255, 0.1);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-family: ui-monospace, monospace;
  }
  footer {
    grid-column: 1 / -1;
    padding: 6px 20px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>
<header>
  <h1>Infrastructure Monitor</h1>
  <div class="stats" id="stats"></div>
</header>
<main>
  <div id="cy"></div>
  <aside id="side">
    <div class="empty">ノードをクリックすると詳細が表示されます</div>
  </aside>
</main>
<footer>
  <span id="last-update">—</span>
  <span>10秒ごとに自動更新</span>
</footer>

<script src="app.js"></script>
</body>
</html>
